<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Porto Ajuda</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../styles/login.css">
  <link rel="stylesheet" href="../styles/geral.css">
  <script src="../components/login.js" defer></script>
  <script src="../components/header_footer.js" defer></script>
  <script src="../components/login.js" defer></script>
</head>

<body>
  <div class="polygon">
  <div class="moon">
     <img src="../assets/moon.png">
  </div>
    
  </div>

   <header class="navbar"></header>

   

  <div class="frame" id="frame">

        <div class="panel panel-login">

      <div class="form-sec">

        <h1 class="title">
          Porto <span>Ajuda</span>
        </h1>

        <p class="subtitulo">
          Pequenas ações podem transformar vidas.<br>
          Faça login e continue ajudando.
        </p>

        <form class="formulario">

          <input
            class="inp"
            type="text"
            placeholder="CPF">

          <input
            class="inp"
            type="password"
            placeholder="Senha">

          <button class="btn" type="submit">
            Fazer Login
          </button>

        </form>

        <p class="sw">
          Ainda não possui uma conta?
          <a id="goCad">Cadastre-se</a>
        </p>

      </div>


    </div>

       <div class="panel panel-cadastro">

      <div class="form-sec">

        <h1 class="title">
          Criar <span>Conta</span>
          
        </h1>

        <p class="subtitulo">
          Junte-se à comunidade Porto Ajuda<br>
          e faça parte dessa transformação.
        </p>

        <form class="formulario">

          <div class="row2">

            <input
              class="inp"
              type="text"
              placeholder="Nome">

            <input
              class="inp"
              type="text"
              placeholder="CPF">

          </div>

          <input
            class="inp"
            type="email"
            placeholder="E-mail">

          <input
            class="inp"
            type="password"
            placeholder="Senha">

          <button class="btn" type="submit">
            Cadastrar
          </button>
          <p class="sw">
          Já possui uma conta?
          <a id="goLogin">Entrar</a>
        </p>
        </form>

        
      </div>
       </div>
    </div>

  </div>

</body>

</html>
