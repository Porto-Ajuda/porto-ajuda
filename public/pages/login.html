<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Porto Ajuda</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/geral.css">

  <script src="../js/login.js" defer></script>
  <script src="../js/header_footer.js" defer></script>

</head>

<body>
  <div class="stars"></div>

   <header class="navbar"></header>

    <div class="bg"></div>

  <div class="frame" id="frame">

        <div class="panel panel-login">

      <div class="form-sec">

        <h1 class="title">
          Porto <br>
          <span>Ajuda</span>
        </h1>

        <p class="subtitulo">
          Pequenas ações podem transformar vidas.<br>
          Faça login e continue ajudando.
        </p>

        <form class="formulario">

          <input
            class="inp"
            type="text"
            placeholder="CPF">

          <input
            class="inp"
            type="password"
            placeholder="Senha">

          <button class="btn" type="submit">
            Fazer Login
          </button>

        </form>

        <p class="sw">
          Ainda não possui uma conta?
          <a id="goCad">Cadastre-se</a>
        </p>

      </div>

      
      <div class="art">

        <div class="logo-wrap">

          <img src="../imgs/moon.png" alt="Logo Porto Ajuda">

        </div>

      </div>

    </div>

       <div class="panel panel-cadastro">

      
      <div class="art">

        <div class="logo-wrap">

          <img src="../imgs/sun.png" alt="Logo Porto Ajuda">

        </div>

      </div>

      <div class="form-sec">

        <h1 class="title">
          Criar <br>
          <span>Conta</span>
        </h1>

        <p class="subtitulo">
          Junte-se à comunidade Porto Ajuda<br>
          e faça parte dessa transformação.
        </p>

        <form class="formulario">

          <div class="row2">

            <input
              class="inp"
              type="text"
              placeholder="Nome">

            <input
              class="inp"
              type="text"
              placeholder="CPF">

          </div>

          <input
            class="inp"
            type="email"
            placeholder="E-mail">

          <input
            class="inp"
            type="password"
            placeholder="Senha">

          <button class="btn" type="submit">
            Cadastrar
          </button>
          <p class="sw">
          Já possui uma conta?
          <a id="goLogin">Entrar</a>
        </p>
        </form>

        
      </div>

    </div>

  </div>

</body>

</html>
